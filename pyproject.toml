[project]
name = "taskhub-api"
version = "1.0.0"
description = "TaskHub — production-style task management REST API built with FastAPI"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "fastapi[standard]>=0.115",
    "sqlalchemy[asyncio]>=2.0.36",
    "alembic>=1.14",
    "aiosqlite>=0.20",
    "asyncpg>=0.30",
    "pydantic-settings>=2.6",
    "pyjwt>=2.10",
    "pwdlib[argon2]>=0.2",
    "structlog>=24.4",
]

[dependency-groups]
dev = [
    "pytest>=8.3",
    "pytest-asyncio>=0.24",
    "ruff>=0.8",
]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]
ignore = [
    "UP042", # (str, Enum) kept deliberately: idiomatic for FastAPI/SQLAlchemy enums
    "UP046", # classic Generic[T] syntax kept for clarity with Pydantic generic models
]

[tool.ruff.lint.per-file-ignores]
"alembic/versions/*" = ["E501"]  # autogenerated migrations
