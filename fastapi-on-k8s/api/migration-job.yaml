apiVersion: batch/v1
kind: Job
metadata:
  name: taskhub-migration
  namespace: taskhub
spec:
  template:
    spec:
      restartPolicy: Never
      initContainers:
      - name: wait-for-postgres
        image: postgres:17-alpine
        command:
        - sh
        - -c
        - |
          until pg_isready -h $DATABASE_HOST -U $DATABASE_USER; do
            echo "waiting for database...";
            sleep 2;
          done;
        env:
        - name: DATABASE_HOST
          valueFrom:
            configMapKeyRef:
              name: taskhub-config
              key: DATABASE_HOST
        - name: DATABASE_USER
          valueFrom:
            configMapKeyRef:
              name: taskhub-config
              key: POSTGRES_USER
      containers:
      - name: migrate
        image: sany2k8/taskhub:v3     # YOUR_DOCKERHUB_USERNAME/YOUR_IMAGE_NAME:TAG
        imagePullPolicy: IfNotPresent
        command:
        - alembic
        - upgrade
        - head
        env:
        - name: SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: taskhub-secret
              key: SECRET_KEY
        - name: DATABASE_HOST
          valueFrom:
            configMapKeyRef:
              name: taskhub-config
              key: DATABASE_HOST
        - name: DATABASE_USER
          valueFrom:
            configMapKeyRef:
              name: taskhub-config
              key: POSTGRES_USER
        - name: DATABASE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: taskhub-secret
              key: POSTGRES_PASSWORD
        - name: DATABASE_NAME
          valueFrom:
            configMapKeyRef:
              name: taskhub-config
              key: POSTGRES_DB
